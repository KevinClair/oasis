spring.application.name=Oasis
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/oasis?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.github.kevin.oasis.models
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Scheduler runtime
oasis.scheduler.runtime.enabled=true
oasis.scheduler.runtime.scan-interval-ms=1000
oasis.scheduler.runtime.scan-limit=100
oasis.scheduler.runtime.time-wheel-enabled=true
oasis.scheduler.runtime.time-wheel-tick-ms=1000
oasis.scheduler.runtime.time-wheel-slot-count=120
oasis.scheduler.runtime.time-wheel-preload-interval-ms=1000
oasis.scheduler.runtime.time-wheel-preload-window-ms=60000
oasis.scheduler.runtime.time-wheel-preload-batch-size=2000
oasis.scheduler.runtime.shard-count=128
oasis.scheduler.runtime.shard-lease-enabled=true
oasis.scheduler.runtime.shard-lease-renew-interval-ms=1000
oasis.scheduler.runtime.shard-lease-duration-ms=5000
oasis.scheduler.runtime.scheduler-node-heartbeat-interval-ms=1000
oasis.scheduler.runtime.scheduler-node-heartbeat-timeout-ms=5000
oasis.scheduler.runtime.scheduler-node-port=8080
# oasis.scheduler.runtime.scheduler-node-id=admin-node-01
oasis.scheduler.runtime.executor-heartbeat-timeout-ms=10000
oasis.scheduler.runtime.executor-offline-check-interval-ms=5000
oasis.scheduler.runtime.invoke-connect-timeout-ms=1000
oasis.scheduler.runtime.invoke-read-timeout-ms=5000
oasis.scheduler.runtime.executor-context-path=/oasis-executor
oasis.scheduler.runtime.executor-auth-enabled=true
oasis.scheduler.runtime.executor-auth-clock-skew-ms=30000
oasis.scheduler.runtime.executor-auth-nonce-expire-ms=120000
oasis.scheduler.runtime.executor-auth-nonce-max-size=20000
oasis.scheduler.runtime.dispatch-retry-enabled=true
oasis.scheduler.runtime.dispatch-retry-interval-ms=1000
oasis.scheduler.runtime.dispatch-retry-batch-size=100
oasis.scheduler.runtime.dispatch-retry-backoff-ms=3000
oasis.scheduler.runtime.dispatch-retry-max-backoff-ms=60000
